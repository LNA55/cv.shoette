<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV — Elena Hercot-Hagège</title>
  <style>
    body {
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f9f9f7;
      color: #222;
    }
    nav {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      display: flex;
      gap: 0.6rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      direction: ltr;
    }
    nav button {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 0;
      font-family: Georgia, serif;
      font-size: 0.8rem;
    }
    nav button.active { color: #222; font-weight: bold; }
    nav button:hover { color: #555; }
    nav span { color: #ddd; }
    h1 { font-size: 1.4rem; font-weight: normal; margin-bottom: 0.3rem; text-align: center; }
    p.subtitle { font-size: 0.9rem; color: #666; margin: 0 0 2rem; text-align: center; }
    p.note {
      font-size: 0.78rem;
      color: #999;
      margin: 1.5rem auto 0;
      max-width: 320px;
      text-align: center;
      line-height: 1.6;
      font-style: italic;
    }
    a.dl {
      display: inline-block;
      padding: 0.7rem 1.8rem;
      background: #222;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }
    a.dl:hover { background: #444; }
    .pages-nav {
      margin-top: 2rem;
      display: flex;
      gap: 1.6rem;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }
    .pages-nav a {
      color: #222;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }
    .pages-nav a:hover { border-color: #222; }
  </style>
</head>
<body>

  <nav id="nav">
    <button onclick="setLang('fr')" id="btn-fr">FR</button>
    <span>·</span>
    <button onclick="setLang('en')" id="btn-en" class="active">EN</button>
    <span>·</span>
    <button onclick="setLang('he')" id="btn-he">עב</button>
  </nav>

  <h1 id="name">Elena Hercot-Hagège</h1>
  <p class="subtitle" id="subtitle">Curriculum vitæ — April 2026</p>
  <a class="dl" href="CV-ELENA-HERCOT-HAGEGE_2026.pdf" download id="dl">Download CV</a>

  <a href="https://il.linkedin.com/in/elenahagege" target="_blank" rel="noopener" aria-label="LinkedIn" style="margin-top:1.2rem; display:inline-block; opacity:0.8; transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#0077B5">
      <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-10h3v10zm-1.5-11.268c-.966 0-1.75-.784-1.75-1.75s.784-1.75 1.75-1.75 1.75.784 1.75 1.75-.784 1.75-1.75 1.75zm13.5 11.268h-3v-5.604c0-1.337-.027-3.059-1.864-3.059-1.865 0-2.151 1.457-2.151 2.962v5.701h-3v-10h2.881v1.367h.041c.401-.761 1.381-1.563 2.844-1.563 3.042 0 3.604 2.002 3.604 4.604v5.592z"/>
    </svg>
  </a>

  <div class="pages-nav">
    <a href="/profile-overview" id="link-profile">profile overview</a>
    <a href="/detail" id="link-detail">detail</a>
    <a href="/AI-experience" id="link-ai">AI experience</a>
  </div>

  <p class="note" id="note"></p>

  <script>
    const translations = {
      fr: {
        lang: "fr", dir: "ltr",
        title: "CV — Elena Hercot-Hagège",
        subtitle: "Curriculum vitæ — Avril 2026",
        dl: "Télécharger le CV",
        note: "",
        profile: "aperçu du profil", detail: "détail", ai: "expérience IA"
      },
      en: {
        lang: "en", dir: "ltr",
        title: "CV — Elena Hercot-Hagège",
        subtitle: "Curriculum vitæ — April 2026",
        dl: "Download CV",
        note: "",
        profile: "profile overview", detail: "detail", ai: "AI experience"
      },
      he: {
        lang: "he", dir: "rtl",
        title: "Elena Hercot-Hagège",
        subtitle: "קורות חיים — אפריל 2026",
        dl: "הורד קורות חיים",
        note: "שפת העברית שלי היא ברמת מתחיל. אוצר המילים המצומצם מאוד שלי אינו מאפשר לי לעבוד בעברית.",
        profile: "סקירת פרופיל", detail: "פרטים", ai: "ניסיון בבינה מלאכותית"
      }
    };

    function setLang(l) {
      const t = translations[l];
      document.documentElement.lang = t.lang;
      document.documentElement.dir = t.dir;
      document.title = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('dl').textContent = t.dl;
      document.getElementById('note').textContent = t.note;
      document.getElementById('link-profile').textContent = t.profile;
      document.getElementById('link-detail').textContent = t.detail;
      document.getElementById('link-ai').textContent = t.ai;
      ['fr','en','he'].forEach(x => document.getElementById('btn-'+x).classList.remove('active'));
      document.getElementById('btn-'+l).classList.add('active');
      const isHe = l === 'he';
      document.getElementById('name').style.fontSize = isHe ? '1.7rem' : '';
      document.getElementById('subtitle').style.fontSize = isHe ? '1.1rem' : '';
      document.getElementById('dl').style.fontSize = isHe ? '1.05rem' : '';
      document.getElementById('note').style.fontSize = isHe ? '0.92rem' : '';
    }
  </script>

</body>
</html>
